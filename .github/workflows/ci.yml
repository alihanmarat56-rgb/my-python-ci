name: Python CI
[cite_start]on: [push, pull_request] [cite: 35]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Установка Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Установка зависимостей
      [cite_start]run: pip install pytest [cite: 35]
    - name: Запуск тестов
      [cite_start]run: pytest [cite: 35]
